# pyproject.toml — livespec-orchestrator-beads-fabro dev tooling configuration.
#
# Generated from livespec/templates/impl-plugin/pyproject.toml.jinja
# at copier-copy time; re-sync via `copier update --vcs-ref=master` when livespec
# publishes a new release.
#
# Authority for the rules expressed here: the live specification at
# livespec/SPECIFICATION/ (notably non-functional-requirements.md
# §"Toolchain pins", §"Shared content provenance", §"Linter rule set",
# §"Typechecker rule set").
#
# NO [build-system] section: livespec-impl-* plugins are NOT published
# PyPI packages; they ship via Claude Code plugin bundling (per
# livespec/SPECIFICATION/contracts.md §"Implementation-plugin
# contract — the 9-skill surface").

[project]
name = "livespec-orchestrator-beads-fabro"
version = "0.0.0"
description = "Beads/Dolt-backed implementation plugin for livespec"
requires-python = ">=3.10.16"
authors = [
    { name = "Chad Woolley", email = "thewoolleyman@gmail.com" },
]

# Per the livespec convention: NO [project.dependencies] table —
# the plugin bundle's _vendor/ tree IS the runtime; end users install
# nothing beyond Python.

[dependency-groups]
# Every Python dev tool is uv-managed via this table (resolved into
# uv.lock; installed into a project-local .venv via
# `uv sync --all-groups`). Mise pins only the non-Python binaries
# in .mise.toml.
#
# `copier` MUST be pinned here per
# livespec/SPECIFICATION/non-functional-requirements.md
# §"Shared content provenance" — every consuming repo's pyproject.toml
# pins copier so `uv` resolves a reproducible version.
dev = [
    "copier==9.6.0",
    "ruff==0.8.6",
    "pyright==1.1.391",
    "pytest==8.3.4",
    "pytest-cov==6.0.0",
    "pytest-icdiff==0.9",
    "pytest-xdist==3.8.0",
    "hypothesis==6.122.3",
    "hypothesis-jsonschema==0.23.1",
    "mutmut==3.2.3",
    "import-linter==2.1",
    "livespec-dev-tooling",
    "livespec-runtime",
]

# livespec-dev-tooling is consumed from the github.com sibling-library
# repo via uv git source per
# livespec/SPECIFICATION/contracts.md §"Shared code sync — livespec-dev-tooling".
# Bump-pin PRs against this repo land each new tag per
# livespec/SPECIFICATION/contracts.md §"Cross-repo coordination — pin-and-bump".
#
# livespec-runtime is the shared runtime sibling library
# (livespec_runtime.cross_repo package). The commands/_cross_repo.py
# module uses its types module for the canonical cross-repo manifest shape.
# Pin matches livespec's pin (>=0.2.0; ~/livespec).
[tool.uv.sources]
livespec-dev-tooling = { git = "https://github.com/thewoolleyman/livespec-dev-tooling.git", tag = "v0.48.0" }
livespec-runtime = { git = "https://github.com/thewoolleyman/livespec-runtime.git", tag = "v0.9.2" }

# ---------------------------------------------------------------------------
# Ruff — sole linter, formatter, import-sorter, complexity checker.
# Rule set mirrors livespec/pyproject.toml [tool.ruff] per
# livespec/SPECIFICATION/non-functional-requirements.md
# §"Linter rule set".
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
# orchestrator-image/e2e-skeleton/** is a SEED TEMPLATE for the W7
# live-golden-master throwaway repo — a separate minimal project copied into a
# throwaway clone, not impl-beads product code. It deliberately uses bare
# `assert`/magic values (pytest idiom) and is NOT subject to this repo's strict
# rule set; exclude it from the lint scan (pyright already scopes via `include`).
extend-exclude = [".claude/hooks/**", "**/_vendor/**", "**/__pycache__/**", "mutants/**", "orchestrator-image/e2e-skeleton/**"]

[tool.ruff.lint]
select = [
    # ----- baseline (11 categories) -----
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "SIM",   # flake8-simplify
    "C90",   # mccabe complexity
    "N",     # pep8-naming
    "RUF",   # ruff-specific
    "PL",    # pylint
    "PTH",   # flake8-use-pathlib
    # ----- additions (16 categories) -----
    "TRY",   # tryceratops — pairs with K10 domain-vs-bugs split
    "FBT",   # flake8-boolean-trap — reinforces K4 keyword-only discipline
    "PIE",   # flake8-pie — miscellaneous anti-patterns
    "SLF",   # flake8-self — bans cross-class _-prefixed access
    "LOG",   # flake8-logging — logging discipline
    "G",     # flake8-logging-format — kwargs-only in log calls
    "TID",   # flake8-tidy-imports — no relative imports + banned-imports
    "ERA",   # eradicate — bans commented-out code (LLM artifact)
    "ARG",   # flake8-unused-arguments
    "RSE",   # flake8-raise — `raise X` over `raise X()`; raise...from discipline
    "PT",    # flake8-pytest-style
    "FURB",  # refurb — modern-Python refactor hints
    "SLOT",  # flake8-slots
    "ISC",   # flake8-implicit-str-concat
    "T20",   # flake8-print — bans print/pprint
    "S",     # flake8-bandit — security anti-patterns
]
ignore = [
    "ISC001",  # implicit-str-concat on one line; conflicts with the formatter
]

[tool.ruff.lint.pylint]
max-args = 6
max-positional-args = 6
max-branches = 10
max-statements = 30

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"abc.ABC" = { msg = "use typing.Protocol" }
"abc.ABCMeta" = { msg = "use typing.Protocol" }
"abc.abstractmethod" = { msg = "use typing.Protocol" }
"pickle" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }
"marshal" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }
"shelve" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }

[tool.ruff.lint.per-file-ignores]
# Shebang-wrapper contract: shebang → docstring → `from _bootstrap import
# bootstrap` → `bootstrap()` → `from <pkg>.<...> import main` →
# `raise SystemExit(main())`. The post-bootstrap() import structurally
# violates I001 + E402; the docstring template may overflow 100 chars.
".claude-plugin/scripts/bin/*.py" = ["I001", "E402", "E501"]
# `_bootstrap.py` carries the canonical Python-version check
# `if sys.version_info < (X, Y): raise SystemExit(127)`. UP036 would
# mark this dead code, but the check is the bootstrap mechanism itself.
".claude-plugin/scripts/bin/_bootstrap.py" = ["UP036"]
# pytest conventions: bare assert, magic literals in assertions,
# subprocess.run with fixed argv lists, composite assertions,
# /tmp paths, token-suffixed variable names, long descriptive
# docstrings. Per livespec's tests/ per-file-ignore set.
"tests/**.py" = [
    "S101", "PLR2004", "S603", "S607", "PT018", "S108", "S105", "TRY003", "E501", "PLR0913",
]
"acceptance/**.py" = [
    "S101", "PLR2004", "S603", "S607", "PT018", "S108", "S105", "TRY003", "E501", "PLR0913",
]
# dev-tooling/checks/ scripts shell out to git, ruff, python via
# subprocess.run with fixed argv lists per the canonical-target
# invocation contract. S603/S607/S404 are over-strict for this
# documented pattern; S105 covers TRAILER-token constants.
"dev-tooling/checks/*.py" = ["S603", "S607", "S404", "S105"]

# ---------------------------------------------------------------------------
# Pyright — strict + seven strict-plus diagnostics. Per
# livespec/SPECIFICATION/non-functional-requirements.md
# §"Typechecker rule set".
# ---------------------------------------------------------------------------

[tool.pyright]
include = [".claude-plugin/scripts", "dev-tooling"]
exclude = ["**/_vendor/**", "**/__pycache__/**"]
# The impl package lives under `.claude-plugin/scripts`; `extraPaths` lets the
# in-repo `dev-tooling/checks/` enforcement scripts (which import the
# `livespec_orchestrator_beads_fabro` store/types to read merge-evidence) resolve it the same
# way the runtime `sys.path` bootstrap does.
extraPaths = [".claude-plugin/scripts", ".claude-plugin/scripts/_vendor"]
pythonVersion = "3.10.16"
typeCheckingMode = "strict"

reportUnusedCallResult = "error"
reportImplicitOverride = "error"
reportUninitializedInstanceVariable = "error"
reportUnnecessaryTypeIgnoreComment = "error"
reportUnnecessaryCast = "error"
reportUnnecessaryIsInstance = "error"
reportImplicitStringConcatenation = "error"

# ---------------------------------------------------------------------------
# Pytest — pytest-cov + pytest-icdiff wiring.
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
# _bootstrap.bootstrap() sets up sys.path at runtime for the shebang
# wrappers. Pytest needs the same paths during collection so plugin-
# package imports and the vendored libs resolve.
pythonpath = [
    ".claude-plugin/scripts",
    ".claude-plugin/scripts/_vendor",
]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--import-mode=importlib",
]

# ---------------------------------------------------------------------------
# Coverage — 100% line + branch. Per
# livespec/SPECIFICATION/non-functional-requirements.md
# §"Code coverage".
# ---------------------------------------------------------------------------

[tool.coverage.run]
branch = true
omit = [
    "*/_vendor/*",
    "*/.venv/*",
    "*/site-packages/*",
    "*/__pycache__/*",
    "tests/e2e/*",
    "tests/e2e-cli/*",
    "tests/prompts/*",
    "/tmp/*",
    "mutants/*",
]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_covered = false
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "raise ImportError",
    "@overload",
    "if __name__ == .__main__.:",
    "sys.path.insert",
    "case _:",
]

# ---------------------------------------------------------------------------
# livespec-dev-tooling consumer layout + check config. Per
# livespec/SPECIFICATION/contracts.md §"Consumer configuration schema".
#
# IMPORTANT — why every role key is spelled out here:
# `livespec_dev_tooling.config.load_config` has two regimes. With NO
# `[tool.livespec_dev_tooling]` block, it falls back to the livespec-core
# historical layout (`_livespec_core_config`). The MOMENT any key in this
# block exists, that whole-block-absent fallback is gone and every omitted
# role key reverts to an EMPTY baseline — which would silently break every
# load_config-driven check (coverage mirror pairings, source/pure/covered
# trees, supervisor entries, etc.). This repo's layout matches the core
# fallback exactly, so we needed to introduce a `destructive_cli_allowlist`
# (read by `no_direct_destructive_cli`) WITHOUT triggering that empty-baseline
# flip. The fix is to restate the full core layout here verbatim, so
# load_config produces the identical Config it produced before this block
# existed, plus the new allowlist key. Keep these in lockstep with
# `_livespec_core_config` if the upstream layout ever changes.
# ---------------------------------------------------------------------------

[tool.livespec_dev_tooling]
# Phase-2 file_lloc FLIP (fleet-check-coverage epic). With this key true, the
# `file_lloc` check hard-gates this repo's WHOLE git-derived first-party-.py
# universe (>250 LLOC => error/exit 1), superseding the hardcoded legacy-tree
# classifier — so the orchestrator's own package (livespec_orchestrator_beads_fabro/**,
# newly-covered since the Phase-0 reroute) is now enforced at the 250 hard
# ceiling, not merely WARNed. Safe to arm: the dispatcher.py decomposition
# (core-split-1..3a) brought every orchestrator file <=200 LLOC, so zero files
# hard-fail today; a 201-250 file still WARNs (soft band), a >250 file fails.
# This is a SEVERITY increase, never a bypass (per .ai/ci-gate-discipline.md and
# the fleet-check-coverage golden rules). Requires livespec-dev-tooling >= v0.39.0
# (the flip lever; this repo is pinned at v0.39.0).
# MUST stay above the [[...mirror_pairings]] array-of-tables below (a bare TOML
# key after an array-of-tables header attaches to that sub-table, not the parent).
file_lloc_hard_gate = true
scenario_tiers = ["tests.e2e-cli", "tests.e2e", "tests.integration", "tests.consumer", "tests.prompts", "tests.bin"]
source_trees = [".claude-plugin/scripts/livespec"]
io_trees = [".claude-plugin/scripts/livespec/io"]
commands_trees = [".claude-plugin/scripts/livespec/commands"]
supervisor_entry_files = [
    ".claude-plugin/scripts/livespec/doctor/run_static.py",
    ".claude-plugin/scripts/bin/_bootstrap.py",
]
dataclasses_tree = ".claude-plugin/scripts/livespec/schemas/dataclasses"
pure_trees = [
    ".claude-plugin/scripts/livespec/parse",
    ".claude-plugin/scripts/livespec/validate",
]
covered_trees = [
    ".claude-plugin/scripts/livespec",
    ".claude-plugin/scripts/bin",
    "dev-tooling",
]
source_tree_prefixes = [
    ".claude-plugin/scripts/livespec/",
    ".claude-plugin/scripts/bin/",
    "dev-tooling/checks/",
]
tests_tree_prefix = "tests/"
target_dirs = [".claude-plugin/scripts", "dev-tooling", "tests"]

# Path-prefix allowlist for the `no_direct_destructive_cli` check: files whose
# repo-root-relative POSIX path starts with one of these entries are exempt
# from the destructive-default CLI scan. The W7 e2e-repo reaper and the W7 LIVE
# golden-master orchestration deliberately create + delete throwaway repos
# (`gh repo create`; `gh api -X DELETE /repos/...` with retry/backoff) inside
# the disposable `livespec-e2e` org; their scripts and runbooks are exempt.
# (The scan only walks dev-tooling/, .claude-plugin/, .claude/plugins/, so the
# orchestrator-image/ scripts are already outside its reach; these entries
# document the exemption and keep it intact if a script is ever relocated.)
#
# The Fabro workflow `prompts/` directory is agent-INSTRUCTION prose, not
# executable tooling: it legitimately names destructive CLIs as PROHIBITIONS
# ("Never run `bd init`") and prescribed remedies, so the literal token
# appears without ever being an invocation. The directory entered this scan's
# reach when the workflow payload was relocated INTO the plugin root
# (`.claude-plugin/.fabro/`, Slice 1 of orchestrator-plugin-self-containment).
# Only the prose prompts are exempt; the sibling `workflow.toml` /
# `workflow.fabro` graph (which carries the real `script=` / `acp.command=`
# tooling) stays under the scan, so a destructive CLI added to an actual
# workflow node still fails the check.
#
# This key MUST stay above the `[[...mirror_pairings]]` array-of-tables below:
# in TOML a bare key after an array-of-tables header attaches to that sub-table,
# not the parent.
destructive_cli_allowlist = [
    ".claude-plugin/.fabro/workflows/implement-work-item/prompts/",
    "orchestrator-image/acceptance-live-golden-master.sh",
    "orchestrator-image/reap-e2e-repos.sh",
    "archive/research/w7-orchestrator-convergence/e2e-repo-reaper.md",
]

# Path-prefix allowlist for the `tests_no_subprocess_spawn` check: tests
# whose repo-root-relative POSIX path starts with one of these entries
# genuinely need a real Python subprocess (no in-process `main()` can
# stand in) and MUST scrub `COVERAGE_PROCESS_START` + `COV_CORE_*` from
# the child env so the child does not self-instrument and race.
# - test_host_side_self_contained_import.py spawns a fresh `-S` (no-site)
#   interpreter to prove the host-side dispatcher import path resolves
#   from `_vendor/` alone (the flattened plugin cache); `-S` + the
#   restricted sys.path it asserts cannot be reproduced in-process.
#
# This key MUST stay above the `[[...mirror_pairings]]` array-of-tables
# below (same TOML attachment reason as `destructive_cli_allowlist`).
subprocess_spawn_allowlist = [
    "tests/bin/test_host_side_self_contained_import.py",
]

[[tool.livespec_dev_tooling.mirror_pairings]]
source_tree = ".claude-plugin/scripts/livespec"
test_tree = "tests/livespec"

[[tool.livespec_dev_tooling.mirror_pairings]]
source_tree = ".claude-plugin/scripts/bin"
test_tree = "tests/bin"

[[tool.livespec_dev_tooling.mirror_pairings]]
source_tree = "dev-tooling/checks"
test_tree = "tests/dev-tooling/checks"

[[tool.livespec_dev_tooling.mirror_pairings]]
source_tree = "livespec_dev_tooling/checks"
test_tree = "tests/livespec_dev_tooling/checks"
