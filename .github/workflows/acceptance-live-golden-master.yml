# W7 LIVE Beads/Fabro golden-master tier — NON-BLOCKING, operator-triggered.
#
# This workflow is DELIBERATELY NOT a per-PR or merge_group gate: it is
# `workflow_dispatch`-only, so it never appears in PR CI and can never be a
# required status check. The hermetic `acceptance` job in ci.yml stays the
# merge gate. This tier:
#   - needs the disposable `livespec-e2e` org token + the Fabro LLM key +
#     Claude model auth + Honeycomb ingest key (the 1Password-provisioned
#     operator secrets);
#   - needs a privileged DinD-capable host with the pinned `fabro` binary and
#     `bd`/`dolt` available (the production orchestrator runtime) — a stock
#     GitHub-hosted runner cannot provide this;
#   - CHURNS GitHub repos (creates + deletes throwaway `livespec-e2e-*` repos)
#     and consumes real LLM budget.
#
# It therefore runs on a SELF-HOSTED runner labeled `livespec-orchestrator`
# (the host that already carries the Fabro/bd/Dolt runtime and the 1Password
# env wrapper). Secrets are injected via the runner's environment (the same
# wrapper the operator uses locally) rather than GitHub Actions secrets, so the
# org-scoped fine-grained token is never copied into GitHub secret storage.
#
# Trigger from the Actions tab (or `gh workflow run`). `mode=preflight`
# (default) only validates host/env/image inputs; `mode=run` executes the full
# create -> factory -> merge -> assert -> delete proof.
#
# CODEX-ACP AUTO-BUMP GATE (repository_dispatch).
# ------------------------------------------------
# In addition to the operator-triggered workflow_dispatch above, this workflow
# is ALSO the factory gate for the codex-acp version auto-bump (plan
# livespec/plan/codex-acp-auto-bump/, epic livespec-3lev.4, PR-C). The weekly
# scan in livespec-dev-tooling opens a PR bumping the baked codex-acp version and
# fires a `repository_dispatch` at THIS repo to prove the new version still works
# end-to-end BEFORE the bump can merge.
#
# CROSS-REPO CONTRACT (PIN — both repos must agree; do NOT change unilaterally):
#   - Trigger:  repository_dispatch, event_type = "codex-acp-golden-master".
#   - client_payload = {
#       "codex_acp_version": "<bare semver, e.g. 0.17.0>",
#       "head_sha":          "<the dev-tooling bump PR head commit SHA>",
#       "pr_number":         <int>,
#       "source_repo":       "livespec-dev-tooling"
#     }
#   - Callback: a GitHub commit status POSTed to thewoolleyman/livespec-dev-tooling
#     at head_sha with context = "codex-acp-golden-master", state =
#     success (gate green) | failure (gate red or run error), target_url = this
#     run's URL, plus a short description.
#
# On the dispatch path the gate runs with `--run --build-image
# --codex-acp-version "<codex_acp_version>"` so the orchestrator container
# reflects current master (incl. the baked-global adapter) and the requested
# codex-acp version is injected as a sandbox prepare-step. The whole run remains
# self-hosted + credentialed + costly, exactly like the workflow_dispatch path.
name: acceptance-live-golden-master

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preflight (validate only) or run (full live proof)"
        type: choice
        default: preflight
        options:
          - preflight
          - run
      name:
        description: "greeting name to assert"
        type: string
        default: Ada
  repository_dispatch:
    types: [codex-acp-golden-master]

# Top-level GITHUB_TOKEN stays read-only: the cross-repo commit-status write is
# done with a scoped GitHub App installation token minted at runtime, never
# GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  live-golden-master:
    name: live-golden-master
    # Self-hosted: the live tier needs privileged DinD + the pinned Fabro/bd/
    # Dolt runtime + the operator secret environment, none of which a
    # GitHub-hosted runner provides.
    runs-on: [self-hosted, livespec-orchestrator]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Run the live golden-master tier (under the 1Password env wrapper)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODE: ${{ inputs.mode }}
          GREET_NAME: ${{ inputs.name || 'Ada' }}
          CODEX_ACP_VERSION: ${{ github.event.client_payload.codex_acp_version }}
        run: |
          set -euo pipefail
          # Two trigger paths share this step:
          #   - repository_dispatch (codex-acp auto-bump gate): --run --build-image
          #     against the requested codex-acp version.
          #   - workflow_dispatch (operator): mode=preflight|run, unchanged.
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            if [ -z "${CODEX_ACP_VERSION:-}" ]; then
              echo "repository_dispatch missing client_payload.codex_acp_version" >&2
              exit 1
            fi
            echo "codex-acp auto-bump gate: testing @$CODEX_ACP_VERSION (build-image)"
            set -- --run --build-image --codex-acp-version "$CODEX_ACP_VERSION" --name "$GREET_NAME"
          else
            flag="--preflight"
            if [ "$MODE" = "run" ]; then flag="--run"; fi
            set -- "$flag" --name "$GREET_NAME"
          fi
          # The self-hosted runner wraps the invocation in the livespec
          # 1Password Environment so LIVESPEC_E2E_GITHUB_TOKEN /
          # ANTHROPIC_API_KEY_LIVESPEC_E2E / CLAUDE_CODE_OAUTH_TOKEN /
          # HONEYCOMB_INGEST_KEY_LIVESPEC are present; secrets are never echoed.
          /data/projects/1password-env-wrapper/with-livespec-env.sh -- \
            just acceptance-live-golden-master -- "$@"

      # --- codex-acp auto-bump gate: cross-repo commit-status callback. ---
      # Runs ONLY on the repository_dispatch path, ALWAYS (so a red gate still
      # posts a failure status). The status is written to livespec-dev-tooling
      # with a GitHub App installation token scoped to that repo — the top-level
      # GITHUB_TOKEN is read-only and cannot write cross-repo.
      - name: Mint App token for the cross-repo status callback
        id: callback-token
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: thewoolleyman
          repositories: livespec-dev-tooling

      - name: Post codex-acp-golden-master status to livespec-dev-tooling
        if: always() && github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ steps.callback-token.outputs.token }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$GATE_OUTCOME" = "success" ]; then
            state="success"
            description="codex-acp golden-master gate green"
          else
            state="failure"
            description="codex-acp golden-master gate red (gate outcome=$GATE_OUTCOME)"
          fi
          echo "Posting state=$state to livespec-dev-tooling@$HEAD_SHA (bump PR #$PR_NUMBER)"
          gh api --method POST \
            "/repos/thewoolleyman/livespec-dev-tooling/statuses/${HEAD_SHA}" \
            -f "state=${state}" \
            -f "context=codex-acp-golden-master" \
            -f "target_url=${RUN_URL}" \
            -f "description=${description}"

      # --- Fail-closed merge gate: a GREEN gate is the ONLY thing that turns
      # on the dev-tooling codex-acp bump PR's auto-merge (that PR is opened
      # WITHOUT auto-merge by the pin-freshness surface). A red or errored gate
      # leaves auto-merge off and the PR open for a human, so an unverified
      # codex-acp version can never merge. See livespec-dev-tooling
      # SPECIFICATION/contracts.md §"codex-acp factory gate".
      - name: Enable auto-merge on the codex-acp bump PR (only on a green gate)
        if: github.event_name == 'repository_dispatch' && steps.gate.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.callback-token.outputs.token }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: |
          set -euo pipefail
          echo "Gate green — enabling auto-merge on livespec-dev-tooling PR #${PR_NUMBER}"
          gh pr merge "${PR_NUMBER}" --repo thewoolleyman/livespec-dev-tooling --rebase --auto
