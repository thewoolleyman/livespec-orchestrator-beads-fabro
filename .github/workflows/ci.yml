# Per-target matrix CI for livespec-orchestrator-beads-fabro.
#
# Generated from livespec/templates/impl-plugin/.github/workflows/
# ci.yml.jinja at copier-copy time; re-sync via `copier update --vcs-ref=master` when
# livespec publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Pre-commit step ordering" (c)-(d) — zero-py subsetting:
#   master pushes + merge_group events always run the full aggregate
#   (merge-queue safety net); pull_request events skip Python-code
#   checks when the changeset contains zero .py files.
#
# Authority: livespec/SPECIFICATION/non-functional-requirements.md
#   §"Toolchain pins" — direct tool invocations (ruff, pyright,
#   pytest, python3) in `run:` lines are forbidden; every step
#   delegates to `just <target>`.
#
# Starter scaffold: the Python-code matrix carries only the tool-
# backed checks (lint, format, types, coverage). The metadata matrix
# is empty. As livespec-orchestrator-beads-fabro populates dev-tooling/checks/
# scripts, add the corresponding `check-<slug>` targets to the
# appropriate matrix and to branch protection's required-status-
# checks list.

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job.
# Combined with the ~/.cache/uv actions/cache step (keyed on uv.lock)
# every uv-sync job uses below, an unchanged lock installs from cache
# and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"

# merge_group is deliberately ABSENT: no merge queue is configured for this
# repo (verified live — zero rulesets, required_merge_queue: null; branch
# protection requires only the ci-green context). Keeping the vestigial trigger
# would leave a dead event in the trigger set. Re-add it only if a merge queue
# is actually adopted.
on:
  pull_request:
  push:
    branches: [master]

# RUNNER ROUTING — deliberately PLAIN `runs-on: ubuntu-latest` everywhere.
#
# Do NOT "restore uniformity" by introducing the flippable
# `runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}`
# form that the other fleet repos use. This repo hosts the fleet's PRIVILEGED
# on-demand gate-runner lane, and livespec-dev-tooling's `self_hosted_routing`
# check is a fail-by-default SECURITY guard: if ANY job's `runs-on` references
# the label `local-ci`, the workflow's trigger set must contain none of six
# forbidden triggers. The flippable form puts the literal `local-ci` into this
# file, dragging the one repo with a privileged lane into that guard's scope and
# leaving a latent default that would route CI to self-hosted runners if the
# CI_RUNNER_LABELS repo variable were ever unset. This repo also registers ZERO
# self-hosted runners today, so that default would simply hang. Adding a
# contained `local-ci` lane here is a two-trust-tier security decision the
# maintainer owns, and it is deliberately NOT being made.
#
# The baked `container:` image below is orthogonal to routing: it gives the
# check jobs the SAME environment the Fabro sandbox runs, so "green in CI" and
# "green in sandbox" mean the same thing (livespec plan/fabro-ci-image-factoring).
jobs:
  setup:
    name: detect-py-changes
    runs-on: ubuntu-latest
    outputs:
      py_changed: ${{ steps.detect.outputs.py_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the base ref reachable for the PR diff below.
          fetch-depth: 0

      - name: Detect Python file changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # Full-depth fetch (checkout already set fetch-depth: 0) — a
            # shallow `--depth=1` fetch doesn't bring in commits prior to
            # the base ref tip, so `git diff origin/${BASE_REF}...HEAD`
            # would intermittently fail with "no merge base" when the
            # local clone's history didn't reach the divergence point.
            # Keep `|| true` as a fallback: when fetch fails (auth,
            # network) we still try the diff against whatever
            # origin/${BASE_REF} ref the checkout already populated.
            git fetch origin "$BASE_REF" || true
            changeset=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            if echo "$changeset" | grep -qE '\.py$'; then
              echo "py_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "py_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "py_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # `setup` is the change-detection GATE only — it deliberately does
      # NO uv pre-warm. The check-python matrix jobs `needs: setup`, so
      # any work here sits on the critical path before the matrix can
      # start. Each matrix job restores ~/.cache/uv itself (keyed on
      # uv.lock, with the `uv-${{ runner.os }}-` prefix
      # restore-key) and runs its own `uv sync`, so on the common
      # unchanged-lock run the cache already exists and every job
      # restores it in parallel with no PyPI fetch. A serial pre-warm
      # here would only help the first run after a lock change — and the
      # prefix restore-key already bounds that to the delta wheels — so
      # it is not worth taxing every run's wall-clock.

  check-python:
    name: ${{ matrix.target }} (${{ matrix.uid }})
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.51.3
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        # bd-ib-sfa2: every target runs under BOTH uids, and BOTH are
        # required. Before this dimension existed the whole matrix ran as
        # root, so CI STRUCTURALLY COULD NOT exhibit a non-root divergence —
        # which is how `_dispatcher_janitor_lock.py:133` stayed uncovered for
        # every non-root runner while CI reported green on the same SHA, and
        # the janitor (which runs NON-ROOT in a fresh checkout) was red on
        # master for weeks.
        #
        # NO divergence-detection machinery is needed, and that is deliberate:
        # the existing 100% coverage gate ALREADY converts divergence into a
        # failure. A line reachable only as root is unreachable in the non-root
        # leg, which then misses 100% and fails; a line reachable only as
        # non-root fails the root leg identically. So divergence cannot survive
        # two independently-gated legs — no comparison step, no report-diffing,
        # no second invariant that could drift from the first.
        #
        # THIS ARGUMENT DEPENDS ON THE COVERAGE FAIL-UNDER REMAINING 100%
        # (`pyproject.toml [tool.coverage.report] fail_under = 100`, which
        # carries the reciprocal note). Lower it and this reasoning lapses:
        # explicit divergence detection would then become necessary, because a
        # line missing in exactly one leg could sit under the threshold in both.
        #
        # Both uids run the FULL target list rather than a curated
        # "targets that can diverge" subset. A hand-enumerated subset would be
        # a drift-prone allowlist that silently stops covering new targets —
        # the defect class of `bd-ib-d9gf`. Uniformity costs runner minutes and
        # buys the absence of a list nobody would remember to update.
        uid:
          - root
          - nonroot
        target:
          - check-lint
          - check-format
          - check-types
          - check-coverage
          # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5:
          # canonical `just check` aggregate slugs that inspect .py source
          # but were not yet run in CI. The py_changed gate is correct for
          # these — nothing to check when a PR changes no .py.
          - check-all-declared
          - check-assert-never-exhaustiveness
          - check-check-mutation
          - check-file-lloc
          - check-global-writes
          - check-keyword-only-args
          - check-main-guard
          - check-match-keyword-only
          - check-newtype-domain-primitives
          - check-no-except-outside-io
          - check-no-inheritance
          - check-no-lloc-soft-warnings
          - check-no-raise-outside-io
          - check-no-write-direct
          - check-pbt-coverage-pure-modules
          - check-per-file-coverage
          - check-private-calls
          - check-public-api-result-typed
          - check-rop-pipeline-shape
          - check-supervisor-discipline
          - check-tests-mirror-pairing
          - check-tests-no-subprocess-spawn
          - check-wrapper-shape
    steps:
      # Per-step `if:` (not job-level) so each matrix entry still reports a
      # status check named `${{ matrix.target }} (${{ matrix.uid }})`. With
      # job-level `if:`, a skipped matrix collapses to one `check-python`
      # status and the per-target detail is lost from the checks list.
      #
      # This is now readability, NOT a gating requirement: branch protection
      # requires only the aggregate `ci-green` context, which `needs:` this job
      # and fails when ANY matrix leg fails. That is also why adding the `uid`
      # dimension — which renames every check context — needs no
      # branch-protection change.
      - name: Skip when no .py changes
        if: needs.setup.outputs.py_changed != 'true'
        run: echo "::notice::skipped ${{ matrix.target }} (${{ matrix.uid }}) — no .py changes in this PR"

      - name: Checkout
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/checkout@v4

      # The baked container runs git as ROOT over a uid-1001 checkout, so every
      # post-checkout git call fails "detected dubious ownership" (exit 128)
      # without this. actions/checkout adds its own safe.directory but scopes it
      # to a temporary HOME it discards, and resolve_repo_root() (config.py)
      # strips all GIT_* env before shelling git — so an env-var GIT_CONFIG_*
      # approach is invisible to it. It MUST be the --global write to
      # $HOME/.gitconfig (HOME=/github/home) so EVERY git call reads it.
      - name: Trust workspace for git (container root-vs-checkout uid)
        if: needs.setup.outputs.py_changed == 'true'
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the mise-action install + the actions/cache uv restore — the
      # container image is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        if: needs.setup.outputs.py_changed == 'true'
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        if: needs.setup.outputs.py_changed == 'true'
        run: uv sync --all-groups

      # bd-ib-sfa2, the NARROW ROUTE (maintainer-decided 2026-07-21).
      #
      # /root is mode 0700 and the ENTIRE baked toolchain lives beneath it —
      # mise itself is /root/.local/bin/mise and there is NO copy anywhere else
      # on the filesystem, so `find / -xdev -name mise -not -path '/root/*'`
      # returns nothing. An unprivileged uid therefore cannot reach the
      # toolchain at all. Env overrides alone CANNOT fix this: they change
      # where mise WRITES, not where it IS. Opening /root to 0755 lets uid 1000
      # reuse the BAKED toolchain read-only, with no image change and no
      # toolchain install.
      #
      # LIMITATION — this must travel WITH the capability and never alone:
      # this is a PARTIAL replica. It reproduces "uid 1000 with access to
      # root's toolchain", NOT "uid 1000 as the janitor sees the world". Any
      # divergence that depends on /root genuinely being 0700 stays invisible
      # to it. The faithful alternative relocates the toolchain to a
      # world-readable path in livespec-dev-tooling's docker/fabro-sandbox/base
      # layer, at the cost of a fleet-wide rebuild, republish, and pin bump;
      # it was weighed and declined, and remains the upgrade path if a
      # /root-mode-dependent divergence ever surfaces.
      #
      # Runs AFTER `uv sync` on purpose: root creates .venv, so the chown must
      # follow it or uid 1000 inherits a venv it cannot write.
      - name: Prepare non-root leg (open baked toolchain to uid 1000)
        if: needs.setup.outputs.py_changed == 'true' && matrix.uid == 'nonroot'
        run: |
          # NO `set -euo pipefail` here. The container job's default shell is
          # `sh -e {0}` — dash, not bash — where `-o pipefail` is an illegal
          # option and the whole step dies with exit 2 before doing any work.
          # The `-e` in the default shell already supplies errexit, so nothing
          # is lost. Verified in the image: `sh -e -c 'false; echo X'` exits 1
          # without printing.
          chmod 0755 /root
          chmod -R a+rX /root/.config /root/.local
          # HOME deliberately NOT under /tmp: that would put the venue inside
          # the `/tmp/*` coverage omit glob (pyproject.toml) and trip
          # livespec-impl-beads-1l6's regression guard.
          mkdir -p /home/ci
          chown -R 1000:1000 /home/ci "$GITHUB_WORKSPACE"
          # The root-side safe.directory trust was written to /github/home,
          # which uid 1000 does not read (its HOME is /home/ci). Without this,
          # every git call from a check fails "detected dubious ownership".
          setpriv --reuid=1000 --regid=1000 --clear-groups \
            env HOME=/home/ci git config --global --add safe.directory '*'

      - name: just ${{ matrix.target }} (root)
        if: needs.setup.outputs.py_changed == 'true' && matrix.uid == 'root'
        run: just ${{ matrix.target }}

      # No `--cov` or fail-under override here: this leg runs the SAME recipe
      # under a different uid, which is the whole point. Nothing about it is
      # advisory, warn-only, or gated behind an env lever — a failure here
      # fails the job, and `ci-green` (the sole required context) fails if any
      # matrix leg fails.
      - name: just ${{ matrix.target }} (uid 1000)
        if: needs.setup.outputs.py_changed == 'true' && matrix.uid == 'nonroot'
        run: |
          setpriv --reuid=1000 --regid=1000 --clear-groups \
            env HOME=/home/ci \
                MISE_DATA_DIR=/root/.local/share/mise \
                MISE_GLOBAL_CONFIG_FILE=/root/.config/mise/config.toml \
                MISE_NOT_FOUND_AUTO_INSTALL=0 \
                MISE_TRUSTED_CONFIG_PATHS="$GITHUB_WORKSPACE" \
                PATH=/root/.local/share/mise/shims:/root/.local/bin:/usr/local/bin:/usr/bin:/bin \
                GITHUB_TOKEN="$GITHUB_TOKEN" \
                GH_TOKEN="$GH_TOKEN" \
              just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix) because it needs a second checkout — livespec core —
  # that no other target does.
  check-doctor-static:
    name: check-doctor-static
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.51.3
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The baked container runs git as ROOT over a uid-1001 checkout, so every
      # post-checkout git call fails "detected dubious ownership" (exit 128)
      # without this. actions/checkout adds its own safe.directory but scopes it
      # to a temporary HOME it discards, and resolve_repo_root() (config.py)
      # strips all GIT_* env before shelling git — so an env-var GIT_CONFIG_*
      # approach is invisible to it. It MUST be the --global write to
      # $HOME/.gitconfig (HOME=/github/home) so EVERY git call reads it.
      - name: Trust workspace for git (container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the mise-action install + the actions/cache uv restore — the
      # container image is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        run: |
          # In a container job, the github.workspace CONTEXT may be the HOST
          # path; $GITHUB_WORKSPACE (env) is the in-container mount, so derive
          # the core plugin root from it to stay container-correct.
          export LIVESPEC_CORE_PLUGIN_ROOT="${GITHUB_WORKSPACE}/.livespec-core/.claude-plugin"
          just check-doctor-static

  # Metadata matrix runs unconditionally to preserve the repo-metadata
  # safety net. check-aggregate-completeness is the wiring-completeness
  # gate (epic li-univck) — verifies the justfile `check:` aggregate
  # wires every canonical slug. check-tool-backed-check-completeness
  # (dev-tooling v0.8.0, epic li-pyright-gate) asserts the four
  # tool-backed checks (lint, format, types, coverage) are LITERAL
  # members of BOTH the `just check` targets array AND a CI matrix —
  # so the metadata matrix MUST carry it here to satisfy the both-
  # surfaces invariant it enforces.
  check-metadata:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.51.3
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-aggregate-completeness
          - check-handoff-dispatch-routing
          - check-local-memory-drift-audit
          # check-no-direct-destructive-cli greps the agent-facing trees
          # for direct destructive-default CLI invocations
          # (livespec/SPECIFICATION/non-functional-requirements.md
          # §"Destructive-default CLI wrapping") so a violation fails CI.
          - check-no-direct-destructive-cli
          - check-no-shadow-ledger-body-identical
          - check-plan-thread-anchor-declared
          - check-primary-checkout-commit-refuse-hook-installed
          # check-red-green-replay (no-arg) validates the COMMIT RANGE
          # origin/master..HEAD — every non-merge commit touching product
          # impl .py must carry EITHER the TDD-Red-*/TDD-Green-* pair
          # shape OR the TDD-Suite-Green-* green-verified shape,
          # regardless of subject prefix (livespec-dev-tooling v0.11.0
          # commit-range mode). It runs unconditionally: on zero-.py PRs
          # the range carries no product .py and trivially passes; on
          # master pushes the range is empty.
          - check-red-green-replay
          - check-self-hosted-routing
          - check-tool-backed-check-completeness
          # check-codex-plugin-structure (P3) validates the orchestrator
          # plugin's Codex cross-runtime surface (repo-root marketplace
          # catalog, nested .codex-plugin/plugin.json manifest, nine
          # .codex-plugin/skills/<op>/SKILL.md bindings) and the
          # no-Codex-hooks contract. Pure-filesystem (no beads / no store /
          # no .py-change gate), so it belongs in the metadata matrix that
          # runs unconditionally — a Codex-surface drift fails CI on every
          # event, including doc-only PRs.
          - check-codex-plugin-structure
          # check-bd-guard lints + hermetically tests the warn-first `bd` guard
          # wrapper (bd-guard/). Pure shell (no beads / no store / no
          # .py-change gate), so it belongs in the metadata matrix that runs
          # unconditionally. ubuntu-latest ships shellcheck; the hermetic
          # harness needs only bash + coreutils.
          - check-bd-guard
          # Live Codex TUI `/skills` picker acceptance. GitHub-hosted CI skips
          # unless an authenticated Codex runner opts in via
          # LIVESPEC_REQUIRE_CODEX_TUI_PICKER=1; the status stays visible.
          - check-codex-skill-picker
          # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5:
          # canonical aggregate slugs that inspect NON-.py surfaces
          # (justfile, docs, marketplace, AGENTS.md/.ai, SKILL.md), need
          # full git history, or gate CI config — so they belong in the
          # always-run, fetch-depth:0 metadata matrix, NOT the py-gated one.
          # check-check-coverage-incremental diffs origin/master...HEAD
          # (needs the base ref this matrix's fetch-depth:0 provides) and
          # spawns its own pytest, so it is self-contained here. The two
          # world-gate checks (check-master-ci-green,
          # check-branch-protection-alignment) are deliberately ABSENT:
          # livespec-dev-tooling v0.37.2 excludes them from the CI-mirror
          # requirement (they enforce at pre-push under an admin token; see
          # livespec/.ai/ci-gate-discipline.md).
          - check-agents-ai-references-resolve
          - check-canonical-recipe-fidelity
          - check-check-coverage-incremental
          - check-check-tools
          - check-ci-matrix-completeness
          - check-claude-md-coverage
          - check-comment-line-anchors
          - check-commit-pairs-source-and-test
          - check-fleet-marketplace-relative-sources
          - check-heading-coverage
          - check-no-direct-tool-invocation
          - check-no-fmt-directives
          - check-no-todo-registry
          - check-partition-completeness
          - check-plugin-resolution
          - check-skill-invocation-paths
          - check-source-trees-scoped-to-consumer
          - check-vendor-manifest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for ALL matrix entries: the
          # check-red-green-replay range validation enumerates
          # origin/master..HEAD and needs origin/master plus the merge
          # base in the clone — a fetch-depth: 1 checkout would make
          # the base unresolvable and fail the check actionably (it
          # never silently passes). Cheap for this repo; harmless for
          # the other metadata entries.
          fetch-depth: 0

      # The baked container runs git as ROOT over a uid-1001 checkout, so every
      # post-checkout git call fails "detected dubious ownership" (exit 128)
      # without this. actions/checkout adds its own safe.directory but scopes it
      # to a temporary HOME it discards, and resolve_repo_root() (config.py)
      # strips all GIT_* env before shelling git — so an env-var GIT_CONFIG_*
      # approach is invisible to it. It MUST be the --global write to
      # $HOME/.gitconfig (HOME=/github/home) so EVERY git call reads it.
      - name: Trust workspace for git (container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the mise-action install + the actions/cache uv restore — the
      # container image is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      # The shared livespec-dev-tooling commit-refuse-hook check
      # enforces the canonical `.git/hooks/pre-commit` AND
      # `.git/hooks/pre-push` body on the primary checkout per
      # livespec/SPECIFICATION/non-functional-requirements.md
      # §"Primary-checkout commit-refuse hook" /
      # §"Commit-refuse hook bootstrap procedure" (family-wide
      # invariant). `actions/checkout` clones with empty hook bodies;
      # install the canonical body via the livespec-dev-tooling
      # installer module (the single wheel-shipped carrier) so the
      # invariant is satisfied for the CI run. The SAME verifier also
      # validates the worktree-discipline pack (worktree-lib.sh +
      # branch-protection.sh + the two `.just` fragments), so install
      # the pack here too — otherwise the verifier's pack arm would skip
      # (zero pack files present) instead of validating byte-identity.
      # Runs AFTER `uv sync` because the installers ARE the just-synced
      # `livespec_dev_tooling` package.
      - name: Install commit-refuse hook + worktree pack (satisfy hook invariant)
        if: matrix.target == 'check-primary-checkout-commit-refuse-hook-installed'
        run: |
          just install-commit-refuse-hooks
          just install-worktree-pack

      - name: just ${{ matrix.target }}
        env:
          # Arm the CI-matrix drift guard (epic livespec-cf4bcu slice 5):
          # now that this repo's matrix + ci-green are complete, flip
          # check-ci-matrix-completeness from warn (exit 0) to FAIL
          # (exit 4), so any future canonical slug wired into `just check`
          # but dropped from CI reddens this leg instead of silently
          # warning. Harmless for the other metadata legs — they do not
          # read this var.
          LIVESPEC_FAIL_IF_CI_MATRIX_GAPS_EXIST: "true"
          # Arm the formatter-suppression guard (check-no-fmt-directives, a
          # check-metadata leg): flip it from warn (exit 0) to FAIL (exit 1)
          # so a `# fmt: off`/`on`/`skip` counter-shave in this repo's own
          # first-party code reddens CI instead of silently warning. This
          # repo is clean, so the leg still exits 0; every OTHER repo stays
          # warn-only until it arms this lever in its own PR. Harmless for
          # the other metadata legs — they do not read it.
          LIVESPEC_FAIL_IF_FMT_DIRECTIVES_EXIST: "true"
        run: just ${{ matrix.target }}

  # CLI end-to-end harness — the top-of-pyramid, user-surface tier whose
  # sole interaction surface is the `claude` CLI binary (per
  # livespec/SPECIFICATION/contracts.md §"CLI end-to-end harness
  # contract"). The harness ships from livespec-dev-tooling (v0.8.0) and
  # is consumed via the imported test_workflow_full_round_trip entry
  # point wired in tests/e2e-cli/. This job runs the MOCK tier
  # (LIVESPEC_E2E_HARNESS=mock — the one mocked boundary is the
  # `claude -p` subprocess; real install-shape setup, real structural
  # skill discovery, the real fail-closed time-bomb coverage gate, and
  # the real per-skill orchestration loop all run). The coverage gate is
  # fail-closed: a `/livespec-orchestrator-beads-fabro:*` skill added without a
  # `tests/e2e-cli/fixtures/<skill>/` directory raises CoverageGateError
  # and fails this job. The `real` tier (driving the actual `claude`
  # binary against the upstream livespec plugin paired in lockstep)
  # requires ANTHROPIC_API_KEY and is deliberately NOT run in CI.
  e2e-cli:
    name: e2e-cli
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.51.3
    # SINGLE env block — this job already had a job-level `env:` carrying
    # LIVESPEC_E2E_HARNESS before the baked-image cutover, so the container
    # preamble's vars are MERGED in here rather than added as a second `env:`
    # key. Two `env:` keys in one job make GitHub reject the entire workflow at
    # startup (zero jobs, no logs), and a permissive YAML parser would silently
    # keep only the last block and drop LIVESPEC_E2E_HARNESS. Keep this ONE block.
    env:
      LIVESPEC_E2E_HARNESS: mock
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Skip when no .py changes
        if: needs.setup.outputs.py_changed != 'true'
        run: echo "::notice::skipped e2e-cli — no .py changes in this PR"

      - name: Checkout
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/checkout@v4

      # The baked container runs git as ROOT over a uid-1001 checkout, so every
      # post-checkout git call fails "detected dubious ownership" (exit 128)
      # without this. actions/checkout adds its own safe.directory but scopes it
      # to a temporary HOME it discards, and resolve_repo_root() (config.py)
      # strips all GIT_* env before shelling git — so an env-var GIT_CONFIG_*
      # approach is invisible to it. It MUST be the --global write to
      # $HOME/.gitconfig (HOME=/github/home) so EVERY git call reads it.
      - name: Trust workspace for git (container root-vs-checkout uid)
        if: needs.setup.outputs.py_changed == 'true'
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the mise-action install + the actions/cache uv restore — the
      # container image is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        if: needs.setup.outputs.py_changed == 'true'
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        if: needs.setup.outputs.py_changed == 'true'
        run: uv sync --all-groups

      - name: Run the CLI e2e harness (mock tier, fail-closed coverage gate)
        if: needs.setup.outputs.py_changed == 'true'
        run: just check-e2e-cli

  acceptance:
    name: acceptance
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.51.3
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The baked container runs git as ROOT over a uid-1001 checkout, so every
      # post-checkout git call fails "detected dubious ownership" (exit 128)
      # without this. actions/checkout adds its own safe.directory but scopes it
      # to a temporary HOME it discards, and resolve_repo_root() (config.py)
      # strips all GIT_* env before shelling git — so an env-var GIT_CONFIG_*
      # approach is invisible to it. It MUST be the --global write to
      # $HOME/.gitconfig (HOME=/github/home) so EVERY git call reads it.
      - name: Trust workspace for git (container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the mise-action install + the actions/cache uv restore — the
      # container image is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: Run golden-master acceptance harness
        run: just acceptance

  # Closed-loop CI telemetry: export this run's per-job timings to Honeycomb
  # (dataset github-ci) and FAIL if Honeycomb does not accept them. The run
  # that produced the data confirms its own telemetry landed — so a broken
  # pipeline can't die silently (it reddens master CI and fires the existing
  # failure notification). Master pushes ONLY (never PRs, so PR feedback
  # stays fast); runs even when checks fail (!cancelled) so failed runs are
  # observable too; excludes itself (still in_progress → no completedAt).
  # `needs` lists every top-level job so this runs last, after each job's
  # timing is final. The export script is a byte-for-byte copy of the
  # livespec CORE reference (.github/scripts/export-ci-telemetry.sh); it is
  # repo-agnostic, driven by $REPO/$RUN_ID from the workflow env.
  export-telemetry:
    name: export-telemetry
    needs: [setup, check-python, check-doctor-static, check-metadata, e2e-cli, acceptance]
    if: ${{ !cancelled() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh

  # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5: the single
  # all-green gate job. It `needs:` every check-bearing job and fails if any
  # dependency failed or was cancelled — a pure GitHub-expression gate (no
  # external action, no direct tool invocation, so it satisfies
  # non-functional-requirements.md §"Toolchain pins"). Branch protection
  # requires ONLY this context, so one stable name gates the whole matrix and
  # never churns as checks are added. A SKIPPED dependency (e.g. the entire
  # check-python or e2e-cli job on a zero-.py PR) is not a failure, so ci-green
  # stays green then. setup (change-detection gate) and export-telemetry
  # (push-only, not a gate) are intentionally absent from `needs:`.
  ci-green:
    name: ci-green
    needs: [check-python, check-doctor-static, check-metadata, e2e-cli, acceptance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
