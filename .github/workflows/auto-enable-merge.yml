# Auto-enable-merge workflow — set --auto --rebase on PRs from the
# user-or-agent identity allowlist, when not draft and not flagged
# do-not-merge.
#
# Generated from livespec/templates/impl-plugin/.github/workflows/
# auto-enable-merge.yml.jinja at copier-copy time; re-sync via
# `copier update --vcs-ref=master` when livespec publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Shared content sync — copier template" — enumerated required
#   workflow file set every livespec-impl-* repo MUST carry.
#
# Auth model:
#   - Uses a GitHub App installation token instead of GITHUB_TOKEN.
#   - actions/create-github-app-token@v1 mints a fresh token at
#     runtime (lasts ~1 hour, discarded after the run).
#   - Required repo secrets: APP_ID, APP_PRIVATE_KEY (managed via
#     `gh secret set`).
#
# Why an App instead of GITHUB_TOKEN: the GraphQL
# `enablePullRequestAutoMerge` mutation requires admin-level repo
# access that `github-actions[bot]` lacks regardless of declared
# `permissions:` scopes. Apps installed on the repo are granted
# the access by the install grant itself.
#
# Enable paths (ANY one qualifies), each still subject to the draft-skip
# and do-not-merge opt-out:
#   - Author in the human allowlist (thewoolleyman).
#   - The fleet's OWN release-please App (author login
#     `livespec-pr-bot[bot]`) on a head branch whose name starts with
#     `release-please--`; the branch-shape guard scopes the App path to
#     release PRs, so the App cannot auto-enable-merge any other PR it
#     authors. EXTERNAL bot PRs (dependabot, future renovate) stay out
#     of scope — author neither in the allowlist nor the fleet App.
#
# Why the release-please App path exists: across 2026-06-30..2026-07-03
# the fleet's release train stalled in all six repos — release-please's
# App-authored release PRs were never in the author allowlist, so
# auto-merge never engaged and the release PRs silently parked. The
# branch-shape-guarded App path closes that gap (livespec-c1k9).

name: Auto-enable merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: auto-enable-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # Composed gate: NOT draft AND do-not-merge label absent AND
    # (author in human allowlist OR the fleet's release-please App on a
    # release-please-- head branch). All continuation lines share one
    # indent so the `>-` fold yields a single-line expression.
    if: >-
      github.event.pull_request.draft == false
      && !contains(github.event.pull_request.labels.*.name, 'do-not-merge')
      && (
      contains(fromJSON('["thewoolleyman"]'), github.event.pull_request.user.login)
      || (github.event.pull_request.user.login == 'livespec-pr-bot[bot]'
      && startsWith(github.event.pull_request.head.ref, 'release-please--'))
      )
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Enable auto-merge (rebase) on PR #${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          if gh pr merge "$PR" --repo "$REPO" --auto --rebase; then
            echo "Auto-merge enabled on PR #$PR (rebase strategy)"
          else
            echo "::error::failed to enable auto-merge on PR #$PR"
            exit 1
          fi
